<div class="page-container">
  <h1 class="page-title">Registration Form</h1>

  <div class="layout-wrapper centered">
    <mat-card class="form-card">
      <mat-card-header style="margin-bottom: 1rem;">
        <div mat-card-avatar><mat-icon style="font-size: 40px; width: 40px; height: 40px;">account_circle</mat-icon></div>
        <mat-card-title style="margin-top: 8px;">Create Account</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="registration-form">
          
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Username</mat-label>
            <input matInput formControlName="username" placeholder="Choose a username">
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email *</mat-label>
            <input matInput type="email" formControlName="email" placeholder="email@example.com">
            <mat-error *ngIf="form.get('email')?.invalid">
              Email is required and must be a valid email.
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password *</mat-label>
            <input matInput type="password" formControlName="password" placeholder="Enter at least 8 characters">
            <mat-error *ngIf="form.get('password')?.invalid">
              Password is required and must be at least 8 characters long.
            </mat-error>
          </mat-form-field>

          <div class="field-container">
            <label class="field-label">Gender</label>
            <mat-radio-group formControlName="gender" class="radio-group">
              <mat-radio-button value="male">Male</mat-radio-button>
              <mat-radio-button value="female">Female</mat-radio-button>
              <mat-radio-button value="other">Other</mat-radio-button>
            </mat-radio-group>
          </div>

          <mat-divider></mat-divider>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Address</mat-label>
            <textarea matInput formControlName="address" rows="2" placeholder="Your street address"></textarea>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Birth Date *</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="birthDate" placeholder="MM/DD/YYYY">
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
            <mat-error *ngIf="form.get('birthDate')?.invalid">
              Birth date is required.
            </mat-error>
          </mat-form-field>

          <div class="field-container">
            <label class="field-label">Angular Skill Level: {{ form.get('skillLevel')?.value }}</label>
            <mat-slider min="0" max="10" step="1" discrete class="full-width">
              <input matSliderThumb formControlName="skillLevel">
            </mat-slider>
          </div>

          <div class="button-container">
            <button mat-flat-button color="primary" type="submit" class="submit-button" [disabled]="form.invalid">
              Submit Information </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
