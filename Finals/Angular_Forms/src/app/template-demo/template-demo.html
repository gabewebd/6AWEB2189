<div class="page-layout">
  <div class="card">
    <h2>{{ title }}</h2>

    <form #myForm="ngForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input class="input" name="username" [(ngModel)]="username" required placeholder="Enter username" #u="ngModel" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input class="input" type="email" name="email" [(ngModel)]="email" required email placeholder="Enter email" #e="ngModel" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input class="input" type="password" name="password" [(ngModel)]="password" required minlength="6" placeholder="Enter password" #p="ngModel" />
      </div>

      <div class="form-group">
        <label>Role</label>
        <select class="input" name="role" [(ngModel)]="role" required>
          <option value="" disabled>Select role</option>
          <option value="Admin">Admin</option>
          <option value="User">User</option>
          <option value="Guest">Guest</option>
        </select>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" [(ngModel)]="gender" value="Male" required> Male</label>
          <label><input type="radio" name="gender" [(ngModel)]="gender" value="Female" required> Female</label>
        </div>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select class="input" name="status" [(ngModel)]="status">
          <option value="Permanent">Permanent</option>
          <option value="Probationary">Probationary</option>
        </select>
      </div>

      <div class="form-group">
        <label>Comments</label>
        <textarea class="input" name="comments" [(ngModel)]="comments" rows="3" placeholder="Notes..."></textarea>
      </div>

      <button class="btn" type="submit" [disabled]="myForm.invalid">Submit Application</button>
    </form>
  </div>

  @if (submitted) {
    <div class="preview">
      <h3>Submission Details</h3>
      <p><strong>User:</strong> {{ username }}</p>
      <p><strong>Email:</strong> {{ email }}</p>
      <p><strong>Password:</strong> {{ password }}</p>
      <p><strong>Role:</strong> {{ role }}</p>
      <p><strong>Gender:</strong> {{ gender }}</p>
      <p><strong>Status:</strong> {{ status }}</p>
      <p><strong>Notes:</strong> {{ comments }}</p>
    </div>
  }
</div>
